<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tambah Bayaran</title>
  <style>
    :root{--navy:#171f6f;--navy-deep:#11195f;--panel:#eff6ff;--soft:#f8fafc;--field:#fff;--field-soft:#f1f7ff;--border:#d8e1ef;--muted:#747781;--red:#c9151b;--green:#14883f;--blue:#70a9ff}*{box-sizing:border-box}html,body{margin:0;min-height:100%;font-family:Inter,"Segoe UI",Arial,sans-serif;color:#050914;background:radial-gradient(ellipse at center,rgba(0,0,0,.72) 0 48%,#000 72%),#000}body{min-height:100vh;display:grid;place-items:center;padding:44px}.stage{position:relative;width:min(1260px,100%)}.stage:before{content:"";position:absolute;inset:-44px -90px -105px;z-index:-2;pointer-events:none;border-radius:42px;background:radial-gradient(ellipse at center,transparent 0 55%,rgba(255,255,255,.1) 57%,transparent 73%),radial-gradient(ellipse at center,rgba(0,0,0,.2) 0 48%,rgba(0,0,0,.9) 78%,#000 100%);opacity:.95}.modal{width:100%;min-height:758px;border-radius:16px;overflow:hidden;background:var(--panel);box-shadow:0 42px 55px rgba(0,0,0,.58)}.modal-header{height:136px;background:var(--navy);color:#fff;position:relative;padding:39px 34px 0}.title{margin:0;font-size:30px;line-height:1;font-weight:900;letter-spacing:-.55px;text-transform:uppercase}.subtitle{margin-top:14px;color:rgba(255,255,255,.62);font-size:15px;font-weight:700;letter-spacing:4.7px;text-transform:uppercase}.close{position:absolute;top:55px;right:52px;width:25px;height:25px;border:0;padding:0;background:transparent;cursor:pointer}.close:before,.close:after{content:"";position:absolute;top:-2px;left:11px;width:3px;height:29px;background:rgba(255,255,255,.7);border-radius:999px;transform:rotate(45deg)}.close:after{transform:rotate(-45deg)}.content{min-height:622px;background:linear-gradient(180deg,rgba(248,250,252,.58),rgba(248,250,252,.58)),var(--panel);padding:68px 44px 27px}.payment-entry-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px}.section-title{display:flex;align-items:center;gap:16px;color:#26347f;font-size:18px;line-height:1;font-weight:900;letter-spacing:4.4px;text-transform:uppercase}.section-title:before{content:"";width:5px;height:22px;border-radius:1px;background:#314ba6;display:block}.add-button{height:41px;min-width:270px;border:0;border-radius:6px;background:#e5ecfa;color:var(--navy-deep);display:inline-flex;align-items:center;justify-content:center;gap:11px;padding:0 18px;font-size:16px;font-weight:900;letter-spacing:1.4px;text-transform:uppercase;cursor:pointer}.plus{width:18px;height:18px;position:relative;flex:0 0 auto}.plus:before,.plus:after{content:"";position:absolute;background:currentColor;border-radius:999px}.plus:before{left:8px;top:1px;width:3px;height:16px}.plus:after{left:1px;top:8px;width:16px;height:3px}.payment-form{display:grid;grid-template-columns:184px 226px 1fr 184px 36px;column-gap:18px;row-gap:17px;align-items:end;margin-bottom:46px}.field-label{margin:0 0 18px 6px;color:#747781;font-size:14px;font-weight:900;letter-spacing:1px;text-transform:uppercase}.field{height:55px;width:100%;border:1px solid var(--border);border-radius:10px;background:var(--field);padding:0 18px;color:#050914;font-size:23px;font-weight:900;outline:none;box-shadow:none}.field.date{background:#f1f7ff}.field.amount{text-align:right}.trash{width:34px;height:34px;border:0;background:transparent;color:var(--red);margin-bottom:10px;cursor:pointer;position:relative}.trash:before{content:"";position:absolute;left:8px;top:9px;width:17px;height:21px;border:3px solid currentColor;border-top:0;border-radius:1px 1px 3px 3px}.trash:after{content:"";position:absolute;left:6px;top:5px;width:21px;height:4px;border-radius:1px;background:currentColor;box-shadow:6px -4px 0 -1px currentColor}.trash .bin-lines{position:absolute;left:13px;top:13px;width:3px;height:13px;background:currentColor;box-shadow:7px 0 0 currentColor}.summary-card{min-height:239px;border-radius:18px;background:var(--navy);color:#fff;padding:31px 29px 28px;box-shadow:0 28px 42px rgba(34,43,113,.18);position:relative;margin-bottom:44px}.summary-row{height:51px;display:flex;align-items:flex-start;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,.14)}.summary-row.second{height:52px;align-items:center;padding-top:2px}.summary-label{color:rgba(255,255,255,.66);font-size:15px;font-weight:800;letter-spacing:2.5px;text-transform:uppercase;padding-top:7px}.summary-value{font-size:22px;font-weight:900;padding-top:5px;letter-spacing:.1px}.summary-row.second .summary-value{padding-top:0}.balance{margin-top:25px}.balance-label{color:rgba(255,255,255,.64);font-size:15px;font-weight:900;letter-spacing:4.4px;text-transform:uppercase;margin-bottom:9px}.balance-value{color:var(--blue);font-size:38px;line-height:1;font-weight:950;letter-spacing:-.9px}.alert-box{position:absolute;right:29px;bottom:28px;width:68px;height:68px;border-radius:15px;background:rgba(255,255,255,.1);display:grid;place-items:center;color:#fff;font-size:45px;font-weight:950;padding-bottom:5px}.footer{display:flex;align-items:center;justify-content:space-between;min-height:61px}.status{display:inline-flex;align-items:center;gap:14px;color:#8fa0b8;font-size:17px;font-weight:500;padding-left:2px}.status-icon{width:22px;height:22px;position:relative;color:#8fa0b8}.status-icon:before{content:"";position:absolute;left:2px;top:4px;width:11px;height:3px;background:currentColor;box-shadow:0 5px 0 currentColor,0 10px 0 currentColor;border-radius:1px}.status-icon:after{content:"";position:absolute;right:2px;bottom:1px;width:12px;height:12px;border-left:2px solid currentColor;border-bottom:2px solid currentColor;transform:rotate(-25deg);border-radius:1px}.actions{display:flex;align-items:center;gap:17px}.action-button{height:58px;min-width:144px;border:0;border-radius:10px;color:#fff;font-size:20px;font-weight:900;display:inline-flex;align-items:center;justify-content:center;gap:12px;cursor:pointer;padding:0 24px}.cancel{background:#c9151b;box-shadow:0 18px 30px rgba(201,21,27,.26)}.save{min-width:257px;background:var(--green);box-shadow:0 18px 30px rgba(20,136,63,.22)}.x-icon{width:18px;height:18px;position:relative}.x-icon:before,.x-icon:after{content:"";position:absolute;top:-2px;left:8px;width:3px;height:23px;background:currentColor;border-radius:999px;transform:rotate(45deg)}.x-icon:after{transform:rotate(-45deg)}.save-icon{width:22px;height:22px;border:3px solid currentColor;border-radius:3px;position:relative}.save-icon:before{content:"";position:absolute;left:4px;top:3px;width:9px;height:5px;background:currentColor;border-radius:1px}.save-icon:after{content:"";position:absolute;left:5px;bottom:3px;width:6px;height:6px;border:2px solid var(--green);background:#fff;border-radius:50%}@media(max-width:900px){body{padding:18px}.modal-header{height:auto;min-height:124px;padding:32px 24px}.close{right:24px;top:40px}.content{padding:38px 24px 26px}.payment-entry-head{gap:18px;align-items:flex-start;flex-direction:column}.payment-form{grid-template-columns:1fr}.trash{margin:0}.summary-card{min-height:250px}.summary-row{height:auto;gap:12px;padding-bottom:14px;flex-direction:column}.footer{gap:20px;align-items:flex-start;flex-direction:column}.actions{width:100%}.action-button{flex:1}}
  </style>
</head>
<body>
  <main class="stage">
    <section class="modal" role="dialog" aria-labelledby="dialogTitle">
      <header class="modal-header">
        <h1 id="dialogTitle" class="title">TAMBAH BAYARAN</h1>
        <div class="subtitle">SUNTING MAKLUMAT PEMBAYARAN SEMASA</div>
        <button class="close" type="button" aria-label="Tutup"></button>
      </header>
      <section class="content">
        <div class="payment-entry-head">
          <div class="section-title">BAYARAN DITAMBAH</div>
          <button class="add-button" type="button" id="addRow"><span class="plus" aria-hidden="true"></span>Tambah Bayaran Baru</button>
        </div>
        <form class="payment-form" id="paymentForm">
          <div class="label-cell"><div class="field-label">Tarikh</div><input class="field date" value="20/05/2026" /></div>
          <div class="label-cell"><div class="field-label">No. Resit</div><input class="field" value="RES-99821-A" /></div>
          <div class="label-cell"><div class="field-label">Catatan</div><input class="field" value="N/A" /></div>
          <div class="label-cell"><div class="field-label">Amaun (RM)</div><input class="field amount payment-amount" value="450.00" inputmode="decimal" /></div>
          <button class="trash" type="button" aria-label="Padam baris"><span class="bin-lines" aria-hidden="true"></span></button>
          <div class="label-cell"><input class="field date" value="20/05/2026" /></div>
          <div class="label-cell"><input class="field" value="RES-98702-B" /></div>
          <div class="label-cell"><input class="field" value="N/A" /></div>
          <div class="label-cell"><input class="field amount payment-amount" value="450.00" inputmode="decimal" /></div>
          <button class="trash" type="button" aria-label="Padam baris"><span class="bin-lines" aria-hidden="true"></span></button>
        </form>
        <section class="summary-card" aria-label="Ringkasan bayaran">
          <div class="summary-row"><div class="summary-label">Tunggakan Semasa</div><div class="summary-value" id="currentArrears">RM 450.00</div></div>
          <div class="summary-row second"><div class="summary-label">Amaun Bayar</div><div class="summary-value" id="totalPaid">RM 900.00</div></div>
          <div class="balance"><div class="balance-label">Baki Tunggakan</div><div class="balance-value" id="remainingBalance">- RM 450.00</div></div>
          <div class="alert-box">!</div>
        </section>
        <footer class="footer">
          <div class="status"><span class="status-icon" aria-hidden="true"></span><span>Sedang menambah bayaran rekod...</span></div>
          <div class="actions">
            <button class="action-button cancel" type="button"><span class="x-icon" aria-hidden="true"></span>Batal</button>
            <button class="action-button save" type="button"><span class="save-icon" aria-hidden="true"></span>Simpan Rekod</button>
          </div>
        </footer>
      </section>
    </section>
  </main>
  <script>
    const form=document.getElementById('paymentForm'),totalPaidEl=document.getElementById('totalPaid'),remainingBalanceEl=document.getElementById('remainingBalance'),arrears=450;
    function formatRM(value){const abs=Math.abs(value).toLocaleString('en-MY',{minimumFractionDigits:2,maximumFractionDigits:2});return value<0?`- RM ${abs}`:`RM ${abs}`}
    function calculateSummary(){const amounts=[...document.querySelectorAll('.payment-amount')];const total=amounts.reduce((sum,input)=>{const number=Number(String(input.value).replace(/,/g,''));return sum+(Number.isFinite(number)?number:0)},0);totalPaidEl.textContent=formatRM(total);remainingBalanceEl.textContent=formatRM(arrears-total)}
    function createRow(){const cells=[['date','20/05/2026'],['','RES-'],['','N/A'],['amount payment-amount','0.00']].map(([cls,val])=>{const d=document.createElement('div');d.className='label-cell';d.innerHTML=`<input class="field ${cls}" value="${val}" ${cls.includes('amount')?'inputmode="decimal"':''}/>`;return d});const b=document.createElement('button');b.className='trash';b.type='button';b.setAttribute('aria-label','Padam baris');b.innerHTML='<span class="bin-lines" aria-hidden="true"></span>';form.append(...cells,b)}
    document.getElementById('addRow').addEventListener('click',()=>{createRow();calculateSummary()});
    form.addEventListener('input',e=>{if(e.target.classList.contains('payment-amount'))calculateSummary()});
    form.addEventListener('click',e=>{const btn=e.target.closest('.trash');if(!btn)return;const remove=[btn];let prev=btn.previousElementSibling;for(let i=0;i<4&&prev;i++){remove.unshift(prev);prev=prev.previousElementSibling}remove.forEach(el=>el.remove());calculateSummary()});
    document.querySelector('.close').addEventListener('click',()=>{document.querySelector('.modal').style.opacity='0';document.querySelector('.modal').style.transform='scale(.985)'});
    document.querySelector('.cancel').addEventListener('click',()=>alert('Rekod dibatalkan.'));
    document.querySelector('.save').addEventListener('click',()=>alert('Rekod berjaya disimpan.'));
    calculateSummary();
  </script>
</body>
</html>
